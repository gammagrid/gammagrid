services:
  app:
    build: .
    ports:
      # The port is published on localhost only — the app must not be
      # reachable from the local network (spec section 5.3).
      - "127.0.0.1:8501:8501"
    volumes:
      - ./data:/app/data
    environment:
      - OPTIONS_TRACKER_DB=data/options.db
